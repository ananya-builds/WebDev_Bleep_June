<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z index</title>
    <style>
        .red{
            height:150px;
            width:150px;
            background-color:red;
            position:absolute;
            top:100px;
            left:100px;
            z-index:5;
            
        }
        .blue{
            height:150px;
            width:150px;
            background-color:blue;
            position:absolute;
            top:150px;
            left:150px;
        }
    </style>
</head>
<body>
    <div class="red">

    </div>

    <div class="blue">

    </div>
</body>
</html>
