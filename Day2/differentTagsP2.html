<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Different Tags</title>
</head>
<body>
    
    <!--details and summary tag-->
    <details>
        <summary>
            What is Amazon?
        </summary>
        <p>It is an <strong>E-Commerce website</strong></p>
    </details>
    <hr>

    <!-- progress tag -->
    <progress value="40" max="100"></progress>
    <hr>

    <!-- meter tag -->
    <meter max="100" min="0" value="60"></meter>
    <hr>

    <!-- abbreviation tag -->
    <p>
        <abbr title="Hypertext Markup Language">HTML</abbr> is a markup language.
    </p>
    <hr>

    <!-- code tag -->
    <p>
        You can use <code>System.out.println</code> in java to print the output.
    </p>
    <hr>

    <!-- kbd tag -->
    <p>
        Shortcut for copying is <kbd>Ctrl</kbd> + <kbd>C</kbd>
    </p>
    <hr>

    <!-- marquee tag -->
    <marquee> Welcome to the Webpage</marquee>
    <hr>

    <!-- time tag -->
    <p>
    Today is <time datetime="2026-06-25"> 25 June, 2026
    </time>
    </p>
    <hr>

    <!-- dialog tag -->
    <dialog open> Enter your name </dialog>

</body>
</html>
