<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Different Tags</title>
</head>
<body>

    <!-- image tags -->
    <h3>Sports Car</h3>
    <img src="https://5.imimg.com/data5/SELLER/Default/2023/6/313621842/TP/EA/EF/190859789/sports-car.jpg" height="200" width="400">
    <h3>Nature</h3>
    <img src="./pexels-afhamhmsyri-34021102.jpg" width="300" height="600">
    <hr>

    <!-- embedded tags -->
    <iframe width="600" height="300" src="https://www.youtube.com/embed/L8S89BCjQvo" title="6am mornings routines in korea&#39;s countryside. Days of living alone in a small forest house" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <hr>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3703.493925964318!2d73.719295!3d21.8384759!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39601d55e43af21f%3A0xb8e23c01a1f6eb18!2sStatue%20Of%20Unity!5e0!3m2!1sen!2sin!4v1782328035258!5m2!1sen!2sin" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    <hr>

    <!-- select tag -->
    <select name="Country">
        <option>India</option>
        <option disabled>Russia</option>
        <option>Japan</option>
        <option>Germany</option>
        <option>Australia</option>
        <option label="USA">United States of America</option>
        <option selected disabled>Country</option>
    </select>
    <select name="city" multiple>
        <option>Delhi</option>
        <option disabled>Mumbai</option>
        <option>Bangalore</option>
        <option>Mysore</option>
        <option>Hyderabad</option>
    </select>
    <select name="food" required size="3">
        <option>rice</option>
        <option>dal</option>
        <option>pizza</option>
        <option>noodles</option>
        <option>momos</option>
    </select>
    <hr>

    <!-- button tag -->
     <button>SignIn</button>
     <button>Add to Cart</button>
     <button>Sumbit</button>
     <button>Register</button>
     <button>Feedback</button>


</body>
</html>
