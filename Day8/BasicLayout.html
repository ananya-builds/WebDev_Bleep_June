<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Layout</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        .container{
            display:grid;
            gap:10px;
            grid-template-columns:250px 1fr;
            grid-template-rows:80px auto 80px;
            border:1px solid black;
        }

        header{
            grid-column:1/3;
            background-color:#2563eb;
            padding:20px;
        }
        aside{
            background-color:#ddd;
            padding:20px;
        }
        main{
            background:aqua;
            padding:20px;
        }
        footer{
            grid-column:1/3;
            color:white;
            background:#333;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>Header</header>

        <aside>Side Bar</aside>

        <main>
            Main Content
        </main>

        <footer>
            Footer
        </footer>
    </div>
</body>
</html>
