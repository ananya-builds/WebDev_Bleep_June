<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Property</title>
    <style>
        *{
            margin:0px;
            padding:0px;
            box-sizing:border-box;
        }
        .products{
            height:80vh;
            position:absolute;
            top:10vh;
            width:100%;

            display:flex;
            flex-direction:row;
            justify-content:center;
            align-items:center;
            gap:30px;
            background-color:aqua;
        }
        .box{
            border: 1px solid black;
            padding:20px;
            width:100px;
            height:100px;
            text-align:center;
            border-radius:10px;
            background-color:brown;
            color:white;
        }
    </style>
</head>
<body>
    <div class="products">
        <div class="box">Cake</div>
        <div class="box">Cookies</div>
        <div class="box">Pastry</div>



    </div>
</body>
</html>
