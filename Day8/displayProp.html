<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Properties</title>
    <style>
        *{
            margin:0px;
            padding:0px;
            box-sizing:border-box;
        }

        nav{
            background-color:#1f2937;
            padding:20px;
        }

        nav h2{
            color:white;
            display: inline-block;
            margin-right:200px;
        }

        nav a{
            color:white;
            margin-right:20px;
            text-decoration:none;
        }

        nav span{
            color:white;
            display:none;
        }
    </style>
</head>
<body>
    <nav>
        <h2>Code Academy</h2>

        <a href="#">Home</a>
        <a href="#">Courses</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>

        <span>Login</span>
    </nav>
</body>
</html>
